name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    name: Tests (VM + Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OS deps
        run: |
          sudo apt update
          sudo apt install -y xvfb

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Run all tests
        shell: bash
        run: |
          chmod +x scripts/test_all.sh
          ./scripts/test_all.sh

  cmake_host_build:
    name: CMake Host Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform_dir: linux
          - os: macos-latest
            platform_dir: macos
          - os: windows-latest
            platform_dir: windows
    steps:
      - uses: actions/checkout@v4

      - name: Build host library (Linux/macOS/Windows)
        shell: bash
        run: |
          cmake -S "./${{ matrix.platform_dir }}" -B "build/host_${{ matrix.platform_dir }}" -DCMAKE_BUILD_TYPE=Release
          cmake --build "build/host_${{ matrix.platform_dir }}" --config Release
